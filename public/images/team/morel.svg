<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="frame-f"><rect width="400" height="500"/></clipPath>
    <radialGradient id="vign-f" cx="48%" cy="46%" r="70%">
      <stop offset="55%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.75)"/>
    </radialGradient>
    <linearGradient id="light-f" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E4E0D8"/>
      <stop offset="100%" stop-color="#B8B4AC"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#frame-f)">
    <rect width="400" height="500" fill="#141414"/>
    <!-- lumière latérale forte (bande claire à gauche) -->
    <linearGradient id="light-side" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#282828"/>
      <stop offset="40%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <rect width="400" height="500" fill="url(#light-side)"/>
    <!-- lignes horizontales -->
    <line x1="0" y1="80" x2="400" y2="80" stroke="#1C1C1C" stroke-width="1"/>
    <line x1="0" y1="160" x2="400" y2="160" stroke="#1C1C1C" stroke-width="1"/>
    <line x1="0" y1="320" x2="400" y2="320" stroke="#1C1C1C" stroke-width="1"/>
    <line x1="0" y1="420" x2="400" y2="420" stroke="#1C1C1C" stroke-width="1"/>
    <!-- blazer ouvert, posture de face mais torsion légère -->
    <path d="M20 500 L20 412 Q50 352 110 328 L120 298 Q156 280 200 278 Q244 280 280 298 L290 328 Q350 352 380 412 L380 500 Z" fill="#181818"/>
    <!-- revers blazer -->
    <path d="M158 294 L200 336 L200 500" stroke="#222" stroke-width="1.5" fill="none"/>
    <path d="M242 294 L200 336" stroke="#222" stroke-width="1.5" fill="none"/>
    <!-- chemise -->
    <path d="M160 295 L200 335 L240 295 L256 272 L200 290 L144 272 Z" fill="#D0CCC4"/>
    <!-- cou -->
    <path d="M183 266 Q200 258 217 266 L219 292 Q200 299 181 292 Z" fill="url(#light-f)"/>
    <!-- tête : lumière latérale dure -->
    <ellipse cx="200" cy="182" rx="70" ry="79" fill="url(#light-f)"/>
    <!-- ombre latérale forte (côté droit) -->
    <linearGradient id="shadow-face" x1="0" y1="0" x2="1" y2="0">
      <stop offset="50%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.5)"/>
    </linearGradient>
    <ellipse cx="200" cy="182" rx="70" ry="79" fill="url(#shadow-face)"/>
    <!-- cheveux blonds/châtains mi-longs raides côté -->
    <path d="M130 168 Q128 90 200 86 Q272 90 270 168 Q275 210 278 310 Q264 275 262 240 Q256 200 220 192 Q210 200 200 200 Q190 200 180 192 Q144 200 138 240 Q136 275 122 310 Q125 210 130 168 Z" fill="#6A6058"/>
    <!-- raie au milieu -->
    <path d="M200 86 L200 130" stroke="#4E4840" stroke-width="2" fill="none"/>
    <!-- oreilles -->
    <ellipse cx="131" cy="190" rx="9" ry="14" fill="#C8C4BC"/>
    <ellipse cx="269" cy="190" rx="9" ry="14" fill="#B8B4AC"/>
    <!-- boucles perles -->
    <circle cx="131" cy="202" r="5" fill="#C8C4BC" stroke="#AAAA9A" stroke-width="1"/>
    <!-- sourcils arqués, bien dessinés -->
    <path d="M166 165 Q178 160 194 165" stroke="#4A4540" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M206 165 Q222 160 234 165" stroke="#4A4540" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- yeux clairs -->
    <ellipse cx="180" cy="184" rx="11" ry="5.5" fill="#2A2822"/>
    <ellipse cx="220" cy="184" rx="11" ry="5.5" fill="#2A2822"/>
    <!-- reflet lumière -->
    <ellipse cx="176" cy="181" rx="3" ry="2" fill="#888"/>
    <ellipse cx="216" cy="181" rx="3" ry="2" fill="#888"/>
    <!-- nez droit, fin -->
    <path d="M197 196 Q194 214 190 222 Q200 227 210 222 Q206 214 203 196 Z" fill="#C0BDB5"/>
    <!-- bouche bien dessinée -->
    <path d="M183 244 Q200 250 217 244" stroke="#181414" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M186 243 Q200 247 214 243" stroke="#D0CCC4" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.3"/>
    <!-- vignettage -->
    <rect width="400" height="500" fill="url(#vign-f)"/>
  </g>
</svg>
