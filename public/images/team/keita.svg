<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="frame-b"><rect width="400" height="500"/></clipPath>
    <radialGradient id="vign-b" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.7)"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#frame-b)">
    <rect width="400" height="500" fill="#161616"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#202020" stroke-width="1"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#202020" stroke-width="1"/>
    <line x1="0" y1="300" x2="400" y2="300" stroke="#202020" stroke-width="1"/>
    <line x1="0" y1="400" x2="400" y2="400" stroke="#202020" stroke-width="1"/>
    <!-- épaules veste -->
    <path d="M20 500 L20 400 Q60 340 130 318 L145 290 Q172 275 200 274 Q228 275 255 290 L270 318 Q340 340 380 400 L380 500 Z" fill="#CCCAC4"/>
    <!-- col chemise blanc -->
    <path d="M165 300 L200 340 L235 300 L260 275 L200 292 L140 275 Z" fill="#E4E0DA"/>
    <!-- collier/bijou discret -->
    <ellipse cx="200" cy="318" rx="18" ry="3" fill="none" stroke="#AAA8A2" stroke-width="1.5"/>
    <!-- cou -->
    <rect x="182" y="268" width="36" height="32" rx="10" fill="#C8C4BC"/>
    <!-- tête légèrement tournée -->
    <ellipse cx="202" cy="188" rx="70" ry="80" fill="#CCCAC4"/>
    <!-- cheveux longs -->
    <path d="M132 175 Q130 95 202 90 Q280 90 275 175 Q280 220 284 310 Q260 280 260 240 Q240 200 202 195 Q164 200 140 240 Q140 280 116 310 Q120 220 132 175 Z" fill="#1A1A1A"/>
    <!-- raie côté gauche -->
    <path d="M152 90 Q160 115 158 145" stroke="#252525" stroke-width="3" fill="none"/>
    <!-- oreille droite (visible) -->
    <ellipse cx="272" cy="194" rx="9" ry="14" fill="#C0BDB5"/>
    <!-- yeux en amande -->
    <ellipse cx="180" cy="192" rx="11" ry="5.5" fill="#151515"/>
    <ellipse cx="222" cy="192" rx="11" ry="5.5" fill="#151515"/>
    <!-- reflet yeux -->
    <ellipse cx="185" cy="190" rx="3" ry="2" fill="#555"/>
    <ellipse cx="227" cy="190" rx="3" ry="2" fill="#555"/>
    <!-- nez droit -->
    <path d="M198 206 L194 224 Q200 230 206 224 L202 206 Z" fill="#BBB8B0"/>
    <!-- bouche -->
    <path d="M186 248 Q202 256 218 248" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M190 249 Q202 252 214 249" stroke="#D4D0C8" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.4"/>
    <!-- vignettage -->
    <rect width="400" height="500" fill="url(#vign-b)"/>
    <!-- grain -->
    <rect width="400" height="500" opacity="0.12" fill="none">
      <animate attributeName="opacity" values="0.12;0.14;0.12" dur="0.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
